<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Cursos Disponibles - Cursos Virtual">
    <meta name="theme-color" content="#667eea">
    <title>Cursos Disponibles - Cursos Virtual</title>

    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .curso-card {
            background: rgba(31, 36, 72, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .curso-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .curso-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        .curso-card h3 {
            margin: 0 0 12px 0;
            color: #99a9ff;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .curso-card p {
            margin: 6px 0;
            color: #c7c9ff;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .profesor {
            font-style: italic;
            color: #99a9ff;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #c7c9ff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .login-prompt {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: rgba(31, 36, 72, 0.8);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-prompt h3 {
            color: #99a9ff;
            margin-bottom: 10px;
        }
        .login-prompt p {
            color: #c7c9ff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="text-align: center; padding: 20px;">
            <h1><i class="fas fa-graduation-cap"></i> Cursos Disponibles</h1>
            <p>Explora nuestros cursos y únete a aprender</p>
        </header>

        <div class="cards" id="cardsCursos">
            <!-- Se cargarán dinámicamente -->
        </div>

        <div class="login-prompt" id="loginPrompt">
            <h3><i class="fas fa-user-plus"></i> ¿Quieres inscribirte?</h3>
            <p>Regístrate como estudiante para acceder a todos nuestros cursos y comenzar tu aprendizaje.</p>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Registrarme / Iniciar Sesión</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        async function cargarCursosPublicos() {
            try {
                const courses = await api.getPublicCourses();
                const container = document.getElementById('cardsCursos');

                if (courses && courses.length > 0) {
                    container.innerHTML = courses.map(course => `
                        <div class="curso-card">
                            <h3>${course.name}</h3>
                            <p class="profesor">Profesor: ${course.professorId ? course.professorId.fullName : 'No especificado'}</p>
                            <p>Fecha de creación: ${new Date(course.createdAt).toLocaleDateString('es-ES')}</p>
                            <div class="btn-group">
                                <button class="btn btn-secondary" onclick="verDetalles('${course._id}')">
                                    <i class="fas fa-info-circle"></i> Ver Detalles
                                </button>
                                <button class="btn btn-primary" onclick="inscribirse('${course._id}')">
                                    <i class="fas fa-user-plus"></i> Inscribirme
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #c7c9ff;">No hay cursos disponibles en este momento.</p>';
                }
            } catch (error) {
                console.error('Error cargando cursos:', error);
                document.getElementById('cardsCursos').innerHTML = '<p style="text-align: center; color: #f44;">Error al cargar los cursos. Inténtalo de nuevo más tarde.</p>';
            }
        }

        function verDetalles(courseId) {
            alert('Funcionalidad de detalles próximamente. ID del curso: ' + courseId);
        }

        function inscribirse(courseId) {
            // Verificar si está logueado
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userRole = localStorage.getItem('userRole');

            if (!isLoggedIn || userRole !== 'estudiante') {
                alert('Debes iniciar sesión como estudiante para inscribirte en un curso.');
                window.location.href = 'index.html';
                return;
            }

            // Enviar solicitud de inscripción
            api.sendEnrollmentRequest(courseId)
                .then(() => {
                    alert('Solicitud de inscripción enviada. Espera la aprobación del profesor.');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error al enviar la solicitud: ' + error.message);
                });
        }

        // Cargar cursos al iniciar
        cargarCursosPublicos();
    </script>
</body>
</html>
